<script>
const DOCS = {"start": "# Equitable Dinners Platform \u2014 Email Manual\n\n**For:** Ashley + anyone at OOH managing email content\n**Maintained by:** Aki & Dino (the devs)\n**Last updated:** 2026-04-22\n\n---\n\n## What this is\n\nA practical guide to every email the platform sends automatically \u2014 when it goes out, who gets it, and exactly where you can edit it. No code knowledge required.\n\nIf you've ever wondered:\n- \"Where does the date in this reminder email come from?\"\n- \"Can I change this copy myself, or do I need the devs?\"\n- \"Why does this email still say 'Inclusivv' somewhere?\"\n\nThis manual answers those.\n\n---\n\n## The 5 email templates that matter\n\nThese are where 95%+ of the platform's email volume goes. Start here.\n\n| # | Template | When it sends | Relative volume |\n|---:|---|---|---|\n| 1 | [Attendee Confirmation](./01-attendee-confirmation.md) | Every RSVP | **High** \u2014 one per signup per conversation |\n| 2 | [Welcome New Account](./02-welcome-new-account.md) | Every new signup | **High** \u2014 one per new user |\n| 3 | [Conversation Notifications](./03-convo-notifications.md) | Pre-event and post-event reminders | **High** \u2014 up to 7 per guest per conversation (reminders, follow-ups) |\n| 4 | [NPS / Feedback Survey](./04-nps-feedback.md) | After each conversation | **Medium** \u2014 one per guest + one per host per conversation |\n| 5 | [Default (catch-all)](./05-default-catchall.md) | 20+ other low-volume emails | **Varies** \u2014 rarely sent individually but collectively significant |\n\n*Actual send volume varies \u2014 the platform's pace depends on how many conversations you're running. As of April 2026 the platform sends roughly 100-200 emails per month across all templates.*\n\n---\n\n## The two things you'll edit most\n\n### 1. Topic-specific email content (most powerful)\n\n**Admin \u2192 Topics \u2192 Edit your topic \u2192 Email tab**\n\nYou'll find rows for each event (Pre-Conversation 1 Guest, Post-Conversation 1 Host, etc.) with editable Content + Subject fields. Different topics can have totally different email copy. This is where the bulk of your day-to-day email editing lives.\n\n### 2. Mailchimp visual templates (for chrome/design)\n\n**Mailchimp \u2192 Email Templates \u2192 Saved \u2192 ED \u2014 \\[template name\\] \u2192 Edit template**\n\nDrag-and-drop visual editor. Use for: logo, footer, social links, copyright, overall design. Changes here apply to the chrome of all emails using that template.\n\n---\n\n## Two things you can't edit directly (request from the devs)\n\nPlatform-wide copy lives in code and requires the devs to change. Examples:\n\n- Email subject lines that are hardcoded (e.g., \"Thanks for joining Inclusivv\")\n- Sign-off wording (\"With gratitude, The Equitable Dinners Team\")\n- Fixed phrasing inside an email (e.g., \"If your plans change, click here...\")\n- The rating scale question on NPS emails\n\n**How to request a change:** create a task in Asana (Inclusivv Platform Transition & Maintenance project) and assign it to the devs, with the email name + the exact copy you want. They'll batch these and ship them in one update.\n\n---\n\n## Good habits\n\n- \u2705 **Always test by sending yourself** \u2014 sign up with a dummy email, attend/register for a test conversation, see what lands\n- \u2705 **Edit one topic first** \u2014 change copy for one topic, send a test, then roll to others\n- \u2705 **Keep personalization merge tags alone** \u2014 `{{user_first_name}}`, `{{currentYear}}`, anything in curly braces or `*|VARS|*` are placeholders the system fills in at send time. Don't edit inside them.\n- \u274c **Don't remove the NPS rating widget blocks** \u2014 the 1-10 rating is core to that email\n- \u274c **Don't paste HTML you're unsure about** into Mailchimp visual editor \u2014 test first\n- \u274c **Don't edit the live \"inclusivv-*\" templates in Mandrill** \u2014 always edit the \"ED \u2014 \\*\" versions via Mailchimp, then \"Send to Mandrill\"\n\n---\n\n## Need help?\n\nCreate a task in Asana (Inclusivv Platform Transition & Maintenance project) and assign it to the devs. If a doc is unclear or out of date, let them know what confused you so it can be fixed.\n", "attendee-confirmation": "# Attendee Confirmation Email\n\n**When it sends:** Every time someone RSVPs to a conversation. Also when you (as host) create a new conversation, you get one of these as confirmation.\n\n**Who gets it:** The guest (or host, on creation).\n\n**How often:** Fires once per RSVP \u2014 so volume scales with how active conversations are. Currently the most frequent guest-facing email.\n\n---\n\n## How the email is built\n\nEvery email on the platform is made of **two kinds of content**:\n\n1. **Template chrome** \u2014 header, footer, logo, copyright, social links. Same across all emails.\n2. **Dynamic content** \u2014 the parts that change per conversation (title, date, host name, etc.).\n\nFor this email, most of the body is dynamic \u2014 pulled live from the conversation and topic you set up in the admin.\n\n---\n\n## What you'll see in the email, and where it comes from\n\n### \ud83d\udfe1 Header\n\n| What the recipient sees | Where it comes from |\n|---|---|\n| Equitable Dinners logo | Global brand setting (applies to all emails). Ashley can upload via **Mailchimp \u2192 Content Studio**. |\n\n### \ud83d\udccb Subject line\n\n| What the recipient sees | Where it comes from |\n|---|---|\n| \"Get ready for your conversation, in partnership with \\[Partner Name\\]!\" | Fixed wording \u2014 the partner name is dynamic. If you want to change the phrase itself, send the devs a request. |\n\n### \ud83c\udfaf Opening paragraph\n\n| What the recipient sees | Where to edit |\n|---|---|\n| \"Everything you need to know to join your **dinner** on **\\[Topic title\\]**, in partnership with **\\[Partner Name\\]**.\" | Topic title: **Admin \u2192 Topics \u2192 Edit \u2192 Title**<br>Partner name: **Admin \u2192 Customers \u2192 Edit** |\n\n### \ud83d\udcc5 Conversation details block\n\n| What the recipient sees | Where to edit |\n|---|---|\n| Date (e.g., \"Saturday, April 26, 2026\") | **Admin \u2192 Conversations \u2192 Edit \u2192 Starts at** |\n| Time range (e.g., \"7:00 PM \u2013 9:00 PM EST\") | Same as above (derived from Starts at + Ends at) |\n| **Location (in-person):** street address | **Admin \u2192 Conversations \u2192 Edit \u2192 Address** (Google autocomplete) |\n| **Location (virtual):** \"Online / Join Link\" | Change by setting venue type to Virtual; join link auto-generated |\n| **How to Join / Extra info** | **Admin \u2192 Conversations \u2192 Edit \u2192 Guest instructions** |\n\n### \ud83d\udcc5 \"Add to Calendar\" links\n\n| What the recipient sees | Where to edit |\n|---|---|\n| Apple / Google / Outlook / Outlook.com / Yahoo! links | Auto-generated from the conversation date + title. **You can't edit these** \u2014 they appear on every attendee confirmation. |\n\n### \ud83d\udd18 Yellow \"View Conversation Details\" button\n\n| What the recipient sees | Where to edit |\n|---|---|\n| Yellow button saying \"View Conversation Details\" that links to the conversation page | The URL is always the conversation's public URL (auto). The button label is fixed \u2014 send the devs a request if you want it changed. |\n\n### \ud83d\udc65 Host information\n\n| What the recipient sees | Where to edit |\n|---|---|\n| \"Your host is \\[Host Name\\].\" | Host's own user profile \u2014 they edit it themselves. **Admin \u2192 Guests/Hosts \u2192 Edit** if you need to fix it for them. |\n| \"You can reach \\[first name\\] at \\[phone\\] or \\[email\\].\" | Same \u2014 host's profile |\n\n### \u270f\ufe0f Optional custom content\n\n| What the recipient sees | Where to edit |\n|---|---|\n| Any custom text you want to add (e.g., \"Please review this video before the conversation\") | \u2b50 **Admin \u2192 Topics \u2192 Edit \u2192 Email tab \u2192 Pre-event guest content** \u2014 this is your most powerful control. Rich text editor, HTML allowed. |\n\n### \ud83d\udc4b Sign-off\n\n| What the recipient sees | Where to edit |\n|---|---|\n| \"With gratitude, The Equitable Dinners Team\" | Platform-level default. Send the devs a request to change. |\n\n### \u2b07\ufe0f Footer\n\n| What the recipient sees | Where to edit |\n|---|---|\n| Social icons, copyright line, OOH mailing address, unsubscribe link | **Mailchimp \u2192 Email Templates \u2192 Saved \u2192 ED \u2014 Attendee Confirmation \u2192 Edit template.** Visual editor. |\n\n---\n\n## \u2b50 Quick reference: \"I want to change X\"\n\n| Want to change | Edit here |\n|---|---|\n| The topic title shown in the email | Admin \u2192 Topics \u2192 Edit \u2192 Title |\n| The date/time of the conversation | Admin \u2192 Conversations \u2192 Edit \u2192 Starts at |\n| The physical location (in-person event) | Admin \u2192 Conversations \u2192 Edit \u2192 Address |\n| The Zoom link | Not directly \u2014 change venue type to Virtual, platform generates it |\n| Extra join instructions | Admin \u2192 Conversations \u2192 Edit \u2192 Guest instructions |\n| **Custom pre-event content (e.g., \"watch this video\")** | \u2b50 Admin \u2192 Topics \u2192 Edit \u2192 Email tab \u2192 Pre-event guest content |\n| Host's contact info in email | Host's own profile (or Admin \u2192 Guests/Hosts \u2192 Edit) |\n| Footer copyright / address / social links | Mailchimp visual editor on ED \u2014 Attendee Confirmation |\n| The subject line wording | Request from the devs (small change, quick turnaround) |\n| The yellow button label | Request from the devs |\n| The \"With gratitude / The Equitable Dinners Team\" sign-off | Request from the devs (affects all emails) |\n\n---\n\n## What's fixed (not editable without the devs' help)\n\nThese are designed into the platform and require a code change:\n\n- The phrasing of \"Everything you need to know to join your...\"\n- The phrasing of \"Your host is...\"\n- The \"If your plans change\" cancellation paragraph\n- The \"Thank you for taking part...\" closing line\n- The \"With gratitude\" valediction and \"The Equitable Dinners Team\" sign-off\n- The yellow button label (\"View Conversation Details\")\n- The subject line template\n\nIf you want any of these phrased differently, send a short list to the devs \u2014 they'll batch them into a single update.\n", "welcome-new-account": "# Welcome Email (New Account)\n\n**When it sends:** Anytime someone creates a new account on the platform.\n**Who gets it:** The new user.\n**How often:** Once per new signup \u2014 first impression of the platform.\n\n---\n\n## How the email is built\n\nUnlike the Attendee Confirmation email, the welcome email's **entire body lives in Mailchimp**. That means **you can rewrite the whole thing in the visual editor** without needing the devs.\n\nOnly two things are pulled live from the user's account:\n- Their first name (for the greeting)\n- Their email address (occasionally used in the body)\n\nEverything else \u2014 headline, paragraphs, CTAs, images \u2014 is yours to edit.\n\n---\n\n## What you'll see in the email, and where it comes from\n\n### \ud83d\udfe1 Header\n\n| What the recipient sees | Where it comes from |\n|---|---|\n| Equitable Dinners logo | Global brand setting |\n\n### \ud83d\udccb Subject line\n\n| What the recipient sees | Where to edit |\n|---|---|\n| \"Thanks for joining Inclusivv\" (currently) | \u26a0\ufe0f Needs a rewrite to \"Thanks for joining Equitable Dinners\" \u2014 send the devs a request |\n\n### \u270f\ufe0f Body (this is mostly yours to control)\n\n| What the recipient sees | Where to edit |\n|---|---|\n| Greeting (e.g., \"Hi \\[First Name\\]!\") | Use `{{user_first_name}}` placeholder in Mailchimp visual editor wherever you want the name to appear |\n| Welcome message paragraph(s) | Fully editable in **Mailchimp \u2192 Saved \u2192 ED \u2014 Welcome New Account** |\n| Reference to user's email | Use `{{user_email}}` placeholder if you want to show it anywhere |\n| Images, CTAs, buttons, onboarding checklists | Fully editable in Mailchimp visual builder \u2014 add/remove/rearrange blocks |\n\n### \ud83d\udc4b Sign-off & Footer\n\n| What the recipient sees | Where to edit |\n|---|---|\n| \"With gratitude, The Equitable Dinners Team\" | Platform-level \u2014 send the devs a request to change |\n| Social icons, copyright, address, unsubscribe | Mailchimp visual editor |\n\n---\n\n## \u2b50 Quick reference: \"I want to change X\"\n\n| Want to change | Edit here |\n|---|---|\n| The welcome message copy (any of it) | **Mailchimp \u2192 Saved \u2192 ED \u2014 Welcome New Account \u2192 Edit template.** The full body is yours. |\n| Subject line (currently mentions Inclusivv) | Request from the devs |\n| Add onboarding checklist, links, CTAs | Mailchimp visual editor \u2014 drop in new blocks |\n| Change the image or images | Mailchimp visual editor |\n| Where the user's name appears | Move the `{{user_first_name}}` placeholder around |\n\n---\n\n## Tips for editing this one\n\n- **Use `{{user_first_name}}` in the greeting** so each recipient sees their own name.\n- **Keep it short** \u2014 this is the first email. Welcome, point them to 1-2 actions, done.\n- **Test with yourself** \u2014 sign up with a test email and see what lands.\n- **Don't reuse Inclusivv-era copy** \u2014 this email is a blank canvas. Let it sound like ED from the first word.\n", "convo-notifications": "# Conversation Notification Emails (Pre- and Post-Event Reminders)\n\n**When it sends:** At several points in a conversation's lifecycle \u2014 36 hours before, 7 days before, after the event, follow-ups days/weeks later.\n**Who gets it:** Guests and hosts (separate versions for each).\n**How often:** Multiple times per conversation \u2014 up to 7 events per guest/host. The workhorse of the platform.\n\n---\n\n## \ud83d\udccc This is the most editable template for you\n\nUnlike every other email, the **body of these emails is stored per-topic in the admin**. That means you can have totally different content for \"Thriving Together Atlanta\" reminders vs \"Belonging\" reminders, per event type.\n\n**One template, many messages, all editable by you.**\n\n---\n\n## The 7+ emails sharing this template\n\n| Email | When it sends | To |\n|---|---|---|\n| Pre-Conversation 1 \u2014 Guest | 36 hours before the event | All registered guests |\n| Pre-Conversation 1 \u2014 Host | 36 hours before the event | The host |\n| Pre-Conversation 2 \u2014 Host | 7 days before the event | The host (extra lead-time reminder) |\n| Post-Conversation 1 \u2014 Guest | Shortly after the event (18 hours / 3 days / 1 week \u2014 you configure) | All guests who attended |\n| Post-Conversation 1 \u2014 Host | Same timing, but for host | The host |\n| Post-Conversation 2 \u2014 Guest | A second follow-up days/weeks later | Guests |\n| Post-Conversation 2 \u2014 Host | Same, but for host | The host |\n| Pre-Premium Event | Before a paid event | Guests who purchased |\n\nEach one is a separate row in the Topic's admin \u2014 and each has **its own content and subject you control**.\n\n---\n\n## How the rendering works (plain English)\n\n1. Someone registers for a conversation on Topic \"X\"\n2. 36 hours before the event, the platform looks up Topic X's admin settings\n3. It finds the \"Pre-Conversation 1 Guest\" row and reads the content you wrote there\n4. It drops that content into the ED-branded email shell and sends\n\nKey insight: **edit once per topic**, the same content goes to everyone who registers for that topic.\n\n---\n\n## Where to edit everything\n\n### \u2b50 The body content (per-topic, per-event)\n\n**Admin \u2192 Topics \u2192 Edit \\[your topic\\] \u2192 Email tab**\n\nYou'll see a list of all the events (Pre 1 Guest, Pre 1 Host, Post 1 Guest, etc.). Click any row to edit:\n\n- **Content** \u2014 the full HTML body of the email. Rich text editor. Supports images, links, formatting.\n- **Subject** \u2014 subject line specific to this event\n- **Send date** (post-event only) \u2014 pick from: 18 hours, 3 days, 1 week, 2 weeks, 3 weeks, 1 month, 2 months after event\n\n### \ud83c\udfa8 The wrapping chrome (header, footer, logo)\n\n**Mailchimp \u2192 Saved \u2192 ED \u2014 Convo Notifications \u2192 Edit template**\n\nShared across all 7 events. Edit once, applies everywhere.\n\n### \ud83d\udc4b Sign-off\n\nPlatform-level default. Send the devs a request.\n\n---\n\n## \u2b50 Quick reference: \"I want to change X\"\n\n| Want to change | Edit here |\n|---|---|\n| The 36-hour reminder for guests attending \"Thriving Together\" | Admin \u2192 Topics \u2192 Thriving Together \u2192 Edit \u2192 Email tab \u2192 **Pre-Conversation 1 Guest** \u2192 edit Content |\n| The 36-hour reminder for hosts | Same path \u2192 **Pre-Conversation 1 Host** \u2192 edit Content |\n| Post-event thank-you email timing (send 3 days after instead of 1 week) | Same path \u2192 **Post-Conversation 1** \u2192 change Send date |\n| Add an image to a reminder email | Paste the image URL into the Content field as `<img src=\"...\">` or upload via Mailchimp Content Studio first |\n| Copy/style of the header/footer/logo | Mailchimp visual editor on ED \u2014 Convo Notifications |\n| Subject line for a specific event | Admin \u2192 Topics \u2192 Edit \u2192 Email tab \u2192 \\[event\\] \u2192 Subject |\n| \"With gratitude / The Equitable Dinners Team\" sign-off | Request from the devs (platform-wide change) |\n\n---\n\n## Common patterns\n\n### \"I want every topic to have the same pre-event reminder copy\"\n\nThen you have to copy-paste that content into each topic's Pre-Conversation 1 row. There's no global default. Consider this when writing: copy you'll want to re-use across 5+ topics should be short and generic.\n\n### \"I want one topic to have special copy\"\n\nThat's exactly what this system was built for. Edit just that topic's row. Others stay untouched.\n\n### \"I want to add a new event \u2014 e.g., email 2 weeks before\"\n\nCan't add new events in the Topic admin without code changes (the events are predefined). But you can extend existing events \u2014 use the \"Post-Conversation 2\" with a longer Send Date for a late follow-up.\n\n---\n\n## Tips\n\n- **Start with one topic to test** \u2014 edit Thriving Together's Pre-Convo 1 Guest content, send yourself a test (sign up as a dummy user), see how it lands. Then replicate to other topics.\n- **HTML is allowed in Content field** \u2014 use for styling, images, links. Keep inline styles only; no `<script>`.\n- **Don't write `{{user_first_name}}` or other placeholders inside the Content field** \u2014 those won't be replaced. Use the email's greeting (handled by the wrapper chrome) for personalization.\n- **New topics get default templates** \u2014 when you create a new Topic, the system seeds standard copy you can override.\n", "nps-feedback": "# NPS / Feedback Survey Email\n\n**When it sends:** After a conversation happens.\n**Who gets it:** Guests and hosts (separate versions).\n**How often:** Once per guest + once per host per conversation.\n\n---\n\n## What's special about this email\n\nMost emails just show text and maybe a button. This one has a **rating widget** \u2014 a row of 1-10 buttons guests can click directly in the email. The rating lands on a follow-up page where they can add a comment.\n\nThe rating widget is built into the template \u2014 don't remove it.\n\n---\n\n## What you can edit\n\n### \u270f\ufe0f The intro copy (above the rating widget) \u2014 per-topic, per-event\n\n**Admin \u2192 Topics \u2192 Edit \\[your topic\\] \u2192 Email tab \u2192 \"during_conversation_guest\" or \"during_conversation_host\" \u2192 Content**\n\nWrite whatever you want above the rating scale:\n- \"Thanks for joining! How was it?\"\n- \"We'd love your feedback on today's conversation...\"\n- Or a longer prompt with specific questions\n\n**Guest vs Host have separate rows** \u2014 edit each if you want different prompts for each audience.\n\n### \ud83c\udfaf Subject line (per-topic, per-event)\n\nSame admin page \u2014 each event has its own Subject field.\n\n### \ud83c\udfa8 Chrome (header, footer, logo, rating widget layout)\n\n**Mailchimp \u2192 Saved \u2192 ED \u2014 NPS \u2192 Edit template**\n\n---\n\n## What you can't edit (without the devs' help)\n\n- The rating scale labels (\"Not at all likely\" / \"Extremely likely\" / \"Your opinion matters\") \u2014 these are fixed copy\n- The actual question (\"How likely are you to recommend this experience?\") \u2014 it's a system-wide setting; the devs can change via a rare super-admin flow\n- Switching from 1-10 scale to 1-5 (or any other structure) \u2014 bigger code change\n\n---\n\n## \u2b50 Quick reference: \"I want to change X\"\n\n| Want to change | Edit here |\n|---|---|\n| The intro text above the rating for guests | Admin \u2192 Topics \u2192 Edit \u2192 Email tab \u2192 **during_conversation_guest** \u2192 Content |\n| The intro text for hosts | Same path \u2192 **during_conversation_host** \u2192 Content |\n| The rating question (\"How likely are you to recommend...\") | Platform-wide \u2014 request from the devs |\n| The \"Your opinion matters\" header | Platform-wide \u2014 request from the devs |\n| Subject line | Admin \u2192 Topics \u2192 Edit \u2192 Email tab \u2192 \\[event\\] \u2192 Subject |\n| Header, footer, logo, social links | Mailchimp visual editor \u2192 ED \u2014 NPS |\n\n---\n\n## What happens after a guest rates\n\n1. Guest clicks a rating button (e.g., \"8\")\n2. Lands on a page pre-filled with their rating\n3. Can add a comment\n4. Submits \u2014 now visible to you in **Admin \u2192 Feedback**\n\nSo the feedback closes the loop back into the platform \u2014 you can review ratings + comments per conversation.\n\n---\n\n## Tips\n\n- **Guest and Host are different people** \u2014 make sure the copy speaks to each audience correctly. A guest wants to be thanked and asked about their experience. A host might want to be asked how the discussion went, what worked, what to improve.\n- **Keep intro copy short** \u2014 the whole point is to get them to click a rating. Don't bury the widget.\n- **Test by sending yourself** (register as a dummy user, attend a test conversation, wait for the email).\n", "default-catchall": "# The \"Default\" Email Template (Catch-All)\n\n**When it sends:** Used as the wrapper for ~20 different low-volume transactional emails \u2014 RSVP cancellations, invite-related notifications, message notifications, CSV export confirmations, etc.\n**Who gets it:** Varies per email type.\n**How often:** Individually rare, but collectively the highest-volume template because many email types share it.\n\n---\n\n## What this template does\n\nThink of this as the **shared email frame** for all the less-common platform emails. Rather than designing a unique template for each (e.g., \"your RSVP was cancelled\"), they all use this common shell so they look consistent with the ED brand.\n\n**The body copy for each of those 20+ emails is stored in the platform code, not in admin or Mailchimp.** That means body changes to specific emails need the devs.\n\n**But the chrome (header, footer, logo) is fully yours** to edit in Mailchimp \u2014 and editing here updates the chrome for all 20+ emails at once.\n\n---\n\n## The 20+ emails using this template\n\nRoughly grouped:\n\n**RSVP / attendance:**\n- RSVP Confirmation (non-US community variant)\n- New RSVP received (host notification)\n- Guest cancelled RSVP (self-confirmation + host notification)\n\n**Conversation lifecycle:**\n- Conversation details changed (guest notification)\n- Conversation cancelled (guest notification + host notification)\n- New conversation created (host confirmation)\n\n**Invitations:**\n- Invitation to a specific conversation\n- Invitation request accepted / denied\n- Invitation receipts\n\n**Messaging:**\n- Message received from host\n- Message received from guest\n\n**Admin:**\n- CSV export ready for download\n- Partner admin invitation\n\n**Platform:**\n- User connection accepted\n\n---\n\n## What you can edit \u2014 and where\n\n### \ud83c\udfa8 Chrome (updates all 20+ emails at once)\n\n**Mailchimp \u2192 Saved \u2192 ED \u2014 Default \u2192 Edit template**\n\n- Header logo\n- Footer: social icons, copyright line, mailing address, unsubscribe\n\n**\u26a0\ufe0f A change here touches every one of those 20+ emails.** If you accidentally break the chrome, many emails send broken. Test by sending yourself a preview before publishing.\n\n### \u270f\ufe0f Individual email bodies\n\nBody copy for each of the 20+ emails lives in the platform code. To change them, send the devs a request with:\n- **Which email** (\"the one that goes out when a guest cancels their RSVP\")\n- **What you want it to say**\n\nthe devs will batch these into a single update.\n\n---\n\n## \u2b50 Quick reference: \"I want to change X\"\n\n| Want to change | Edit here |\n|---|---|\n| Logo, footer, copyright, social links \u2014 on all 20+ emails | **Mailchimp \u2192 Saved \u2192 ED \u2014 Default \u2192 Edit template** |\n| The specific wording of a cancellation or invite email | Request from the devs \u2014 describe which email + desired copy |\n| Subject line of a specific email | Request from the devs |\n\n---\n\n## Tips\n\n- **Most of these emails are infrequent** \u2014 someone getting a \"Conversation Cancelled\" email isn't pleasant news anyway. Don't over-invest in perfecting rarely-sent emails.\n- **If you find \"Inclusivv\" in a transactional email after launch**, it's likely in one of these 20+ email bodies. Flag it to the devs with: \"I got email X and it still says Inclusivv.\"\n- **The chrome is shared** \u2014 so rebranding the ED \u2014 Default template once rebrands all 20+ emails. High leverage.\n"};
function render(key) {
  document.querySelectorAll('aside nav a').forEach(a => a.classList.toggle('active', a.dataset.doc === key));
  document.getElementById('doc').innerHTML = marked.parse(DOCS[key]);
  document.querySelectorAll('#doc a[href$=".md"]').forEach(a => {
    const base = a.getAttribute('href').replace(/^\.\//,'').replace(/\.md$/,'').replace(/^\d+-/,'');
    const mapping = {'attendee-confirmation':'attendee-confirmation','welcome-new-account':'welcome-new-account','convo-notifications':'convo-notifications','nps-feedback':'nps-feedback','default-catchall':'default-catchall','start-here':'start'};
    if (mapping[base]) {
      a.href = '#' + base;
      a.addEventListener('click', e => { e.preventDefault(); render(mapping[base]); });
    }
  });
  window.scrollTo(0, 0);
  history.replaceState(null, '', '#' + key);
}
document.querySelectorAll('aside nav a').forEach(a => a.addEventListener('click', () => render(a.dataset.doc)));
render(location.hash.slice(1) || 'start');
</script>
